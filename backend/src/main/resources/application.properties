spring.application.name=pubflow
server.port=8080

# H2 database file-based (sviluppo)
spring.datasource.url=jdbc:h2:file:./data/pubflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dialetto Hibernate per H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Creazione automatica delle tabelle
spring.jpa.hibernate.ddl-auto=update

# Inizializzazione dati demo
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Log delle query SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console (accessibile su /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Cache semplice (Spring usa ConcurrentMapCache di default)
spring.cache.type=simple
caching.spring.menuCacheTTL=30000
caching.spring.ordineCacheTTL=10000
caching.spring.prenotazioneCacheTTL=30000
