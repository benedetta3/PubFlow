<section class="mappa-locale">
  <h3>Planimetria del Locale</h3>
  <p class="mappa-legenda">
    <span class="legenda-item"><span class="dot cap-4"></span> 4 Posti</span>
    <span class="legenda-item"><span class="dot cap-6"></span> 6 Posti</span>
    <span class="legenda-item"><span class="dot cap-10"></span> 10 Posti</span>
    <span class="legenda-item"><span class="dot occupato"></span> Occupato</span>
  </p>

  <div class="floor-container">
    <!-- Pareti e etichette -->
    <div class="wall-label entrata">ENTRATA</div>
    <div class="wall-label cucina">CUCINA</div>
    <div class="wall-label cassa">CASSA</div>

    <!-- Tavoli posizionati sulla planimetria -->
    <div
      *ngFor="let t of tavoli"
      class="tavolo"
      [class.t4]="t.capienza === 4"
      [class.t6]="t.capienza === 6"
      [class.t10]="t.capienza === 10"
      [class.occupato]="t.stato === 'OCCUPATO'"
      [style.grid-area]="'t' + t.numero"
    >
      <span class="t-num">{{ t.numero }}</span>
    </div>
  </div>
</section>
