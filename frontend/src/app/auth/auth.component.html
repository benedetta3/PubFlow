<section class="auth-card">
  <div>
    <h2>Login (Basic Auth)</h2>
  </div>

  <div class="auth-form">
    <label>
      Username
      <input type="text" [(ngModel)]="username" placeholder="Username" autocomplete="off" />
    </label>
    <label>
      Password
      <input type="password" [(ngModel)]="password" placeholder="Password" autocomplete="off" />
    </label>

    <div class="error-msg" *ngIf="errore">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      {{ errore }}
    </div>
    <div class="actions">
      <button type="button" (click)="save()">Salva</button>
      <button type="button" class="secondary" (click)="clear()">Reset</button>
    </div>
  </div>

  <p class="status" *ngIf="saved">Credenziali salvate. Le richieste ora includono l'header Authorization.</p>
</section>
